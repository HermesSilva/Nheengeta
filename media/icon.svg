<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256">
  <defs>
    <radialGradient id="bg" cx="50%" cy="42%" r="70%">
      <stop offset="0%" stop-color="#1f3129"/>
      <stop offset="100%" stop-color="#101b16"/>
    </radialGradient>
    <radialGradient id="petal" cx="35%" cy="35%" r="80%">
      <stop offset="0%" stop-color="#ff7a6e"/>
      <stop offset="100%" stop-color="#d92637"/>
    </radialGradient>
    <linearGradient id="hair" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#33201a"/>
      <stop offset="100%" stop-color="#24140f"/>
    </linearGradient>
  </defs>

  <!-- background -->
  <circle cx="128" cy="128" r="122" fill="url(#bg)"/>
  <circle cx="128" cy="128" r="122" fill="none" stroke="#4caf6e" stroke-opacity="0.35" stroke-width="3"/>

  <!-- hair back -->
  <circle cx="128" cy="120" r="80" fill="url(#hair)"/>
  <ellipse cx="60" cy="158" rx="18" ry="42" fill="url(#hair)"/>
  <ellipse cx="196" cy="158" rx="18" ry="42" fill="url(#hair)"/>

  <!-- face -->
  <circle cx="128" cy="146" r="58" fill="#eeb08a"/>

  <!-- fringe -->
  <path d="M70 146
           A58 58 0 0 1 186 146
           Q170 128 150 134
           Q140 116 120 132
           Q94 122 70 146 Z"
        fill="url(#hair)"/>

  <!-- closed eyes, serene -->
  <path d="M98 158 Q107 165 116 158" fill="none" stroke="#3a241a" stroke-width="4" stroke-linecap="round"/>
  <path d="M140 158 Q149 165 158 158" fill="none" stroke="#3a241a" stroke-width="4" stroke-linecap="round"/>

  <!-- lashes -->
  <path d="M96 156 L91 153" stroke="#3a241a" stroke-width="3" stroke-linecap="round"/>
  <path d="M160 156 L165 153" stroke="#3a241a" stroke-width="3" stroke-linecap="round"/>

  <!-- blush -->
  <circle cx="99" cy="172" r="8" fill="#f2907c" opacity="0.45"/>
  <circle cx="157" cy="172" r="8" fill="#f2907c" opacity="0.45"/>

  <!-- gentle smile -->
  <path d="M119 180 Q128 188 137 180" fill="none" stroke="#b0603f" stroke-width="4" stroke-linecap="round"/>

  <!-- face paint: two small dots (traço indígena discreto) -->
  <circle cx="128" cy="146" r="2.6" fill="#b0603f" opacity="0.8"/>
  <circle cx="128" cy="156" r="2.6" fill="#b0603f" opacity="0.8"/>

  <!-- red flower, hair adornment above the ear -->
  <g transform="translate(182 102) rotate(12)">
    <ellipse cx="0" cy="-17" rx="9.5" ry="15" fill="url(#petal)" transform="rotate(0)"/>
    <ellipse cx="0" cy="-17" rx="9.5" ry="15" fill="url(#petal)" transform="rotate(72)"/>
    <ellipse cx="0" cy="-17" rx="9.5" ry="15" fill="url(#petal)" transform="rotate(144)"/>
    <ellipse cx="0" cy="-17" rx="9.5" ry="15" fill="url(#petal)" transform="rotate(216)"/>
    <ellipse cx="0" cy="-17" rx="9.5" ry="15" fill="url(#petal)" transform="rotate(288)"/>
    <circle cx="0" cy="0" r="7" fill="#ffcf5c"/>
    <circle cx="-2" cy="-2" r="2.4" fill="#fff2c4" opacity="0.9"/>
  </g>

</svg>
